<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Змейка</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #111;
            font-family: Arial, sans-serif;
            color: white;
        }
        canvas {
            border: 2px solid #fff;
            background-color: black;
        }
        #score {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 24px;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="score">Score: 0</div>
    <canvas id="game" width="400" height="400"></canvas>
    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const gridSize = 20;
        const tileSize = 20;

        let snake = [[10, 10], [9, 10], [8, 10]];
        let direction = { x: 0, y: 1 };
        let food = null;
        let score = 0;
        let gameRunning = false;

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // Draw snake
            for (let segment of snake) {
                ctx.fillStyle = 'green';
                ctx.fillRect(segment[0] * tileSize, segment[1] * tileSize, tileSize, tileSize);
            }
            // Draw food
            ctx.fillStyle = 'red';
            ctx.fillRect(food[0] * tileSize, food[1] * tileSize, tileSize, tileSize);
        }

        function generateFood() {
            let newFood;
            while (true) {
                let x = Math.floor(Math.random() * 20);
                let y = Math.floor(Math.random() * 20);
                if (!snake.some(segment => segment[0] === x && segment[1] === y)) {
                    newFood = [x, y];
                    break;
                }
            }
            food = newFood;
        }

        function moveSnake() {
            const head = [snake[0][0] + direction.x, snake[0][1] + direction.y];
            // Check collision with walls
            if (head[0] < 0 || head[0] >= 20 || head[1] < 0 || head[1] >= 20) {
                endGame();
                return;
            }
            // Check collision with self
            const body = snake.slice(1);
            if (body.some(segment => segment[0] === head[0] && segment[1] === head[1])) {
                endGame();
                return;
            }
            // Move snake
            snake.unshift(head);
            // Check for food
            if (head[0] === food[0] && head[1] === food[1]) {
                score++;
                generateFood();
            } else {
                snake.pop();
            }
        }

        function endGame() {
            alert('Game Over! Score: ' + score);
            gameRunning = false;
        }

        document.addEventListener('keydown', function(e) {
            const key = e.key;
            if (key === 'ArrowUp' || key === 'w') {
                if (direction.y !== 1) direction = { x: 0, y: -1 };
            } else if (key === 'ArrowDown' || key === 's') {
                if (direction.y !== -1) direction = { x: 0, y: 1 };
            } else if (key === 'ArrowLeft' || key === 'a') {
                if (direction.x !== 1) direction = { x: -1, y: 0 };
            } else if (key === 'ArrowRight' || key === 'd') {
                if (direction.x !== -1) direction = { x: 1, y: 0 };
            } else if (key === 'Enter') {
                if (!gameRunning) {
                    snake = [[10, 10], [9, 10], [8, 10]];
                    direction = { x: 0, y: 1 };
                    score = 0;
                    gameRunning = true;
                    generateFood();
                    gameLoop();
                }
            }
        });

        function gameLoop() {
            if (!gameRunning) return;
            moveSnake();
            draw();
            setTimeout(gameLoop, 100);
        }

        // Initialize
        generateFood();
        gameRunning = true;
        document.getElementById('score').innerText = 'Score: ' + score;
        gameLoop();
    </script>
</body>
</html>
