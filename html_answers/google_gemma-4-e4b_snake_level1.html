<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Змейка (Snake Game)</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Arial', sans-serif;
            background-color: #282c34;
            color: #ffffff;
            padding-top: 20px;
        }
        #gameCanvas {
            border: 5px solid #61dafb;
            background-color: #1e2127;
            box-shadow: 0 0 20px rgba(97, 218, 251, 0.3);
        }
        #scoreBoard {
            margin-bottom: 15px;
            font-size: 1.5em;
            text-transform: uppercase;
        }
        h1 {
            color: #61dafb;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <h1>🐍 Змейка</h1>
    <div id="scoreBoard">Счет: <span id="scoreValue">0</span></div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <p style="margin-top: 20px; color: #aaa;">Управление: Стрелки или WASD. Нажмите любую клавишу для перезапуска после Game Over.</p>

    <script>
        // --- Константы и настройки игры ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreValueElement = document.getElementById('scoreValue');

        const GRID_SIZE = 20; // Размер одной клетки в пикселях
        const BOARD_SIZE = 20; // Количество клеток по ширине/высоте (400 / 20)
        const GAME_SPEED = 150; // Скорость игры в мс

        // --- Переменные состояния игры ---
        let snake;
        let food;
        let dx = GRID_SIZE; // Начальное направление: Вправо
        let dy = 0;
        let score = 0;
        let gameLoopInterval;
        let isGameOver = false;

        // --- Инициализация игры ---
        function initGame() {
            // Сброс состояния
            clearInterval(gameLoopInterval);
            isGameOver = false;
            score = 0;
            dx = GRID_SIZE;
            dy = 0;
            
            // Начальная позиция змейки (в центре)
            snake = [{ x: BOARD_SIZE / 2 * GRID_SIZE, y: BOARD_SIZE / 2 * GRID_SIZE }];
            scoreValueElement.textContent = score;

            placeFood();
            drawGame(); // Отрисовка начального состояния
            gameLoopInterval = setInterval(gameTick, GAME_SPEED);
        }

        // --- Логика размещения еды ---
        function placeFood() {
            let newFoodPosition;
            do {
                // Генерируем случайные координаты в пределах канваса
                newFoodPosition = { 
                    x: Math.floor(Math.random() * BOARD_SIZE) * GRID_SIZE, 
                    y: Math.floor(Math.random() * BOARD_SIZE) * GRID_SIZE 
                };
            } while (isCollision(newFoodPosition, snake)); // Убеждаемся, что еда не на змейке
            food = newFoodPosition;
        }

        // --- Проверка коллизий (для еды и для тела) ---
        function isCollision(pos1, pos2) {
            return pos1.x === pos2.x && pos1.y === pos2.y;
        }

        // --- Основной игровой цикл ---
        function gameTick() {
            if (isGameOver) return;

            // 1. Вычисляем новую голову змейки
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            // 2. Проверка коллизий
            if (checkCollision(head)) {
                gameOver();
                return;
            }

            // 3. Обновление тела змейки
            snake.unshift(head); // Добавляем новую голову
            
            // 4. Проверка поедания еды
            if (checkFoodConsumption()) {
                score += 10;
                scoreValueElement.textContent = score;
                placeFood(); // Генерируем новую еду
                // Если съели, не удаляем хвост, змейка растет
            } else {
                snake.pop(); // Стандартное движение: удаляем хвост
            }

            // 5. Отрисовка и запуск следующего кадра
            drawGame();
        }

        // --- Проверка коллизий (Стена или Тело) ---
        function checkCollision(head) {
            // Столкновение со стеной
            if (head.x < 0 || head.x >= canvas.width || head.y < 0 || head.y >= canvas.height) {
                return true;
            }

            // Столкновение с собственным телом (начиная со второго сегмента, так как голова уже там)
            for (let i = 1; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    return true;
                }
            }
            return false;
        }

        // --- Проверка поедания еды ---
        function checkFoodConsumption() {
            const head = snake[0];
            if (head.x === food.x && head.y === food.y) {
                return true; // Еда съедена
            }
            return false;
        }

        // --- Отрисовка всех элементов на Canvas ---
        function drawGame() {
            // 1. Очистка канваса (фон)
            ctx.fillStyle = '#1e2127';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 2. Рисование еды
            ctx.fillStyle = 'red';
            ctx.fillRect(food.x, food.y, GRID_SIZE - 2, GRID_SIZE - 2);

            // 3. Рисование змейки
            for (let i = 0; i < snake.length; i++) {
                if (i === 0) {
                    ctx.fillStyle = '#4CAF50'; // Голова ярче
                } else {
                    ctx.fillStyle = '#66BB6A'; // Тело
                }
                // Рисуем с небольшим отступом для эффекта сетки
                ctx.fillRect(snake[i].x, snake[i].y, GRID_SIZE - 2, GRID_SIZE - 2);
            }
        }

        // --- Обработка ввода (Управление) ---
        document.addEventListener('keydown', e => {
            const key = e.key;
            let newDx = dx;
            let newDy = dy;

            // Определяем новое направление
            if (key === 'ArrowUp' || key === 'w') {
                newDx = 0; newDy = -GRID_SIZE;
            } else if (key === 'ArrowDown' || key === 's') {
                newDx = 0; newDy = GRID_SIZE;
            } else if (key === 'ArrowLeft' || key === 'a') {
                newDx = -GRID_SIZE; newDy = 0;
            } else if (key === 'ArrowRight' || key === 'd') {
                newDx = GRID_SIZE; newDy = 0;
            }

            // Предотвращаем движение назад (нельзя развернуться мгновенно)
            if ((newDx !== 0 && dx === -GRID_SIZE) || (newDx !== 0 && dx === GRID_SIZE)) {
                // Если пытаемся двигаться горизонтально, а сейчас вертикально, и наоборот.
            } else if ((newDy !== 0 && dy === -GRID_SIZE) || (newDy !== 0 && dy === GRID_SIZE)) {
                 // Это условие уже покрыто выше, но для ясности: если новое направление противоположно текущему, игнорируем.
                if (Math.sign(newDx / GRID_SIZE) * Math.sign(dx / GRID_SIZE) < 0 || 
                    Math.sign(newDy / GRID_SIZE) * Math.sign(dy / GRID_SIZE) < 0) {
                        // Это значит, что мы пытаемся развернуться на 180 градусов
                } else {
                     dx = newDx; dy = newDy;
                }
            } else {
                 dx = newDx; dy = newDy;
            }

            // Если игра окончена, любая нажатая клавиша должна перезапустить игру
            if (isGameOver) {
                initGame();
            }
        });


        // --- Game Over ---
        function gameOver() {
            clearInterval(gameLoopInterval);
            isGameOver = true;

            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)'; // Затемнение фона
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#ff4d4d';
            ctx.font = '30px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('GAME OVER!', canvas.width / 2, canvas.height / 2 - 20);
            
            ctx.fillStyle = '#ffffff';
            ctx.font = '20px Arial';
            ctx.fillText(`Ваш счет: ${score}`, canvas.width / 2, canvas.height / 2 + 10);

            // Инструкция по перезапуску
            ctx.fillStyle = '#61dafb';
            ctx.font = '18px Arial';
            ctx.fillText('Нажмите любую клавишу для рестарта', canvas.width / 2, canvas.height / 2 + 50);
        }

        // --- Запуск игры при загрузке страницы ---
        window.onload = initGame;

    </script>
</body>
</html>
