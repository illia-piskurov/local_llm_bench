<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <style>
        body {
            background-color: #2c3e50;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #game-container {
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            border: 5px solid #ecf0f1;
            border-radius: 5px;
        }

        canvas {
            display: block;
            background-color: #000;
        }

        #ui {
            text-align: center;
            margin-bottom: 10px;
        }

        #score-board {
            font-size: 24px;
            font-weight: bold;
        }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        #overlay h1 {
            margin: 0;
            color: #e74c3c;
            font-size: 40px;
        }

        #overlay p {
            font-size: 18px;
            margin: 10px 0;
        }

        .controls-hint {
            margin-top: 20px;
            font-size: 14px;
            color: #bdc3c7;
        }
    </style>
</head>
<body>

    <div id="ui">
        <div id="score-board">Score: 0</div>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div id="overlay">
            <h1>GAME OVER</h1>
            <p id="final-score"></p>
            <p>Press <b>SPACE</b> to Restart</p>
        </div>
    </div>

    <div class="controls-hint">Use Arrows or WASD to move</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score-board');
        const overlay = document.getElementById('overlay');
        const finalScoreElement = document.getElementById('final-score');

        // Настройки игры
        const gridSize = 20; // Размер клетки
        const tileCount = canvas.width / gridSize; // Количество клеток по горизонтали/вертикали

        let score = 0;
        let dx = 0;
        let dy = 0;
        let snake = [];
        let food = { x: 5, y: 5 };
        let gameSpeed = 100;
        let gameInterval = null;
        let isGameOver = false;

        // Инициализация игры
        function initGame() {
            score = 0;
            dx = 1; // Начальное направление - вправо
            dy = 0;
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
            scoreElement.textContent = `Score: ${score}`;
            isGameOver = false;
            overlay.style.display = 'none';
            createFood();
            
            if (gameInterval) clearInterval(gameInterval);
            gameInterval = setInterval(gameLoop, gameSpeed);
        }

        // Создание еды
        function createFood() {
            food = {
                x: Math.floor(Math.random() * tileCount),
                y: Math.floor(Math.random() * tileCount)
            };
            // Проверка, чтобы еда не появилась внутри змейки
            for (let segment of snake) {
                if (segment.x === food.x && segment.y === food.y) {
                    createFood();
                }
            }
        }

        // Основной цикл игры
        function gameLoop() {
            if (isGameOver) return;

            update();
            draw();
        }

        // Логика движения и столкновений
        function update() {
            // Движение головы
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            // Столкновение со стенами
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                return gameOver();
            }

            // Столкновение с самим собой
            for (let i = 0; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    return gameOver();
                }
            }

            snake.unshift(head);

            // Поедание еды
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreElement.textContent = `Score: ${score}`;
                createFood();
            } else {
                snake.pop(); // Удаляем хвост, если не съели еду
            }
        }

        // Отрисовка
        function draw() {
            // Очистка поля
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Рисуем еду
            ctx.fillStyle = '#e74c3c';
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2);

            // Рисуем змейку
            snake.forEach((segment, index) => {
                ctx.fillStyle = index === 0 ? '#2ecc71' : '#27ae60'; // Голова чуть светлее
                ctx.fillRect(segment.x * gridSize, segment.y * gridSize, gridSize - 2, gridSize - 2);
            });
        }

        function gameOver() {
            isGameOver = true;
            clearInterval(gameInterval);
            finalScoreElement.textContent = `Your Score: ${score}`;
            overlay.style.display = 'flex';
        }

        // Управление
        function handleKeyPress(e) {
            const key = e.key;
            const goingUp = dy === -1;
            const goingDown = dy === 1;
            const goingRight = dx === 1;
            const goingLeft = dx === -1;

            // Перезапуск на пробел
            if (isGameOver && key === ' ') {
                initGame();
                return;
            }

            // Управление (стрелки или WASD)
            if ((key === 'ArrowUp' || key === 'w') && !goingDown) {
                dx = 0; dy = -1;
            }
            if ((key === 'ArrowDown' || key === 's') && !goingUp) {
                dx = 0; dy = 1;
            }
            if ((key === 'ArrowLeft' || key === 'a') && !goingRight) {
                dx = -1; dy = 0;
            }
            if ((key === 'ArrowRight' || key === 'd') && !goingLeft) {
                dx = 1; dy = 0;
            }
        }

        window.addEventListener('keydown', handleKeyPress);

        // Запуск игры при загрузке
        initGame();
    </script>
</body>
</html>
