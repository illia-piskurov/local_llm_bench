<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Змейка</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #222;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        canvas {
            border: 2px solid #444;
            background-color: #111;
        }
        .score {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-size: 24px;
            z-index: 10;
        }
        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            z-index: 20;
            display: none;
        }
        .restart-btn {
            margin-top: 10px;
            padding: 8px 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="score">Score: <span id="score">0</span></div>
    <canvas id="gameCanvas" width="300" height="300"></canvas>
    <div class="game-over" id="gameOver">
        Game Over!<br>Press R to restart
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const gameOverElement = document.getElementById('gameOver');

        let gridSize = 10;
        let cellSize = Math.min(canvas.width, canvas.height) / gridSize;

        // Создание сетки
        function drawGrid() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < gridSize; i++) {
                // Вертикальные линии
                ctx.strokeStyle = '#444';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(i * cellSize, 0);
                ctx.lineTo(i * cellSize, canvas.height);
                ctx.stroke();

                // Горизонтальные линии
                ctx.beginPath();
                ctx.moveTo(0, i * cellSize);
                ctx.lineTo(canvas.width, i * cellSize);
                ctx.stroke();
            }
        }

        let snake = [
            {x: 5 * cellSize, y: 10 * cellSize}
        ];
        let food = {
            x: Math.floor(Math.random() * gridSize) * cellSize,
            y: Math.floor(Math.random() * gridSize) * cellSize
        };

        // Направление движения змейки
        let direction = {x: cellSize, y: 0};
        let nextDirection = {x: cellSize, y: 0};

        function updateSnake() {
            const head = {...snake[0]};
            head.x += nextDirection.x;
            head.y += nextDirection.y;

            snake.unshift(head);

            // Проверка столкновения со стеной
            if (
                head.x < 0 ||
                head.x >= canvas.width ||
                head.y < 0 ||
                head.y >= canvas.height
            ) {
                gameOver();
            }

            // Проверка столкновения с собой
            for (let i = 1; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    gameOver();
                }
            }

            // Проверка съедения еды
            if (head.x === food.x && head.y === food.y) {
                scoreElement.textContent = parseInt(scoreElement.textContent) + 1;
                generateFood();
            } else {
                snake.pop();
            }
        }

        function generateFood() {
            let validPosition;
            do {
                food = {
                    x: Math.floor(Math.random() * gridSize) * cellSize,
                    y: Math.floor(Math.random() * gridSize) * cellSize
                };
                // Проверка, что еда не падает на змейку
                validPosition = true;
                for (let segment of snake) {
                    if (segment.x === food.x && segment.y === food.y) {
                        validPosition = false;
                        break;
                    }
                }
            } while (!validPosition);
        }

        function draw() {
            drawGrid();
            ctx.fillStyle = '#4CAF50';
            snake.forEach(segment => {
                ctx.fillRect(segment.x, segment.y, cellSize - 2, cellSize - 2);
            });

            ctx.fillStyle = '#FF5733';
            ctx.fillRect(food.x, food.y, cellSize - 2, cellSize - 2);

            updateSnake();
        }

        // Обработка клавиатуры
        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'ArrowUp':
                    if (nextDirection.y === 0) nextDirection = {x: 0, y: -cellSize};
                    break;
                case 'ArrowDown':
                    if (nextDirection.y === 0) nextDirection = {x: 0, y: cellSize};
                    break;
                case 'ArrowLeft':
                    if (nextDirection.x === 0) nextDirection = {x: -cellSize, y: 0};
                    break;
                case 'ArrowRight':
                    if (nextDirection.x === 0) nextDirection = {x: cellSize, y: 0};
                    break;
                case 'W':
                    if (nextDirection.y === 0) nextDirection = {x: 0, y: -cellSize};
                    break;
                case 'S':
                    if (nextDirection.y === 0) nextDirection = {x: 0, y: cellSize};
                    break;
                case 'A':
                    if (nextDirection.x === 0) nextDirection = {x: -cellSize, y: 0};
                    break;
                case 'D':
                    if (nextDirection.x === 0) nextDirection = {x: cellSize, y: 0};
                    break;
                case 'r':
                    resetGame();
                    break;
            }
        });

        function gameOver() {
            direction = null;
            gameOverElement.style.display = 'block';
        }

        function resetGame() {
            snake = [{x: 5 * cellSize, y: 10 * cellSize}];
            direction = {x: cellSize, y: 0};
            nextDirection = {x: cellSize, y: 0};
            generateFood();
            scoreElement.textContent = '0';
            gameOverElement.style.display = 'none';

            // Перерисовка сетки
            drawGrid();
        }

        function startGame() {
            setInterval(draw, 100);
            resetGame();
        }

        startGame();
    </script>
</body>
</html>
